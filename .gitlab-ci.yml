stages:
  - test
  - build
  - deploy
  - push

variables:
  DOCKER_IMAGE: "$CI_REGISTRY_IMAGE/backend"
  IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
  FULL_IMAGE_PATH: "$DOCKER_IMAGE:$IMAGE_TAG"
  FRONTEND_DOCKER_IMAGE: "$CI_REGISTRY_IMAGE/frontend"
  FRONTEND_FULL_IMAGE_PATH: "$FRONTEND_DOCKER_IMAGE:$IMAGE_TAG"
  DOCKER_COMPOSE_FILE: "docker-compose.yml"

before_script:
  - echo "$CI_JOB_TOKEN" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

unit_tests:
  stage: test
  tags:
    - docker
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir -r backend/requirements.txt
  script:
    - pytest tests/ -v --tb=short --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml

lint:
  stage: test
  tags:
    - docker
  image: python:3.11-slim
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - ruff check backend/ utils/ tests/
  allow_failure: true

build_backend:
  stage: build
  tags:
    - docker
  script:
    - docker build -t $FULL_IMAGE_PATH -f backend/Dockerfile .
    - docker tag $FULL_IMAGE_PATH "$DOCKER_IMAGE:latest"

build_frontend:
  stage: build
  tags:
    - docker
  script:
    - docker build -t $FRONTEND_FULL_IMAGE_PATH -f frontend/Dockerfile .
    - docker tag $FRONTEND_FULL_IMAGE_PATH "$FRONTEND_DOCKER_IMAGE:latest"

deploy_services:
  stage: deploy
  tags:
    - docker
  script:
    - docker compose -f $DOCKER_COMPOSE_FILE down --remove-orphans
    - docker compose -f $DOCKER_COMPOSE_FILE up -d --wait
    - docker image prune -f
  environment:
    name: staging

smoke_test:
  stage: deploy
  tags:
    - docker
  needs: [deploy_services]
  script:
    - curl --retry 10 --retry-delay 5 --retry-connrefused -sf http://localhost:8000/health
    - curl --retry 5 --retry-delay 3 --retry-connrefused -sf http://localhost:3000/ > /dev/null

push_backend:
  stage: push
  tags:
    - docker
  script:
    - docker push $FULL_IMAGE_PATH
    - docker push "$DOCKER_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

push_frontend:
  stage: push
  tags:
    - docker
  script:
    - docker push $FRONTEND_FULL_IMAGE_PATH
    - docker push "$FRONTEND_DOCKER_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
